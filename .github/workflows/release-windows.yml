name: Release Windows Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-release:
    name: Build Windows Installer and upload
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          # Prefer clean install; fall back to `npm install` if lockfile and package.json are out of sync
          npm ci --unsafe-perm || npm install --unsafe-perm

      - name: Build frontend + tauri bundle (Windows)
        run: |
          npm run build
          cd src-tauri
          # Build Tauri app for Windows (installer created under target/release/bundle)
          cargo +stable build --release
          ../node_modules/.bin/tauri build

      - name: List bundle output (for logs)
        run: |
          echo "=== Bundle structure ==="
          dir /s src-tauri\target\release\bundle || true
          echo "=== EXE files ==="
          dir src-tauri\target\release\bundle\nsis\*.exe || true
          echo "=== MSI files ==="
          dir src-tauri\target\release\bundle\msi\*.msi || true

      - name: Upload .exe to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
